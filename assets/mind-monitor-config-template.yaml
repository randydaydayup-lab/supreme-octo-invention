# 关键词配置模板
# 文件：mind-monitor-config.yaml
# 说明：每个类别需覆盖正面、中性、负面三类词汇

# ========== 通用监测关键词 ==========
general:
  brand_mentions:
    - "百度健康"
    - "百度问医生"
    - "百度健康APP"
  product_features:
    - "线上问诊"
    - "在线问诊"
    - "图文问诊"
    - "视频问诊"

# ========== 按心智维度分类 ==========

# 信任/可靠性
trustworthiness:
  - "百度健康 靠谱吗"
  - "百度健康 可信吗"
  - "百度健康 医生真实"
  - "百度健康 骗人"
  - "百度健康 资质"
  - "百度健康 验证"

# 价格敏感度
pricing:
  - "百度健康 太贵了"
  - "问诊费用 不划算"
  - "有没有优惠券"
  - "比医院便宜吗"
  - "百度健康 收费"
  - "百度健康 价格"

# 响应速度
response_speed:
  - "百度健康 响应慢"
  - "等待时间 太长"
  - "百度健康 很快"
  - "医生及时回复"
  - "等了好久"
  - "秒回"

# 用户体验
user_experience:
  - "百度健康 好用"
  - "百度健康 难用"
  - "百度健康 界面"
  - "百度健康 操作"
  - "百度健康 体验"

# 深层需求
deepNeeds:
  - "百度健康 隐私"
  - "线上问诊 不用见人"
  - "百度健康 方便"
  - "不用排队"
  - "在家看病"

# 竞品对比（如需竞品分析时启用）
competitor_comparison:
  - "百度健康 还是 好大夫"
  - "百度健康 还是 平安好医生"
  - "改用XX了"
  - "比百度健康更好"

# ========== 特定人群关键词 ==========
demographics:
  young_female:
    - "小姐妹推荐 百度健康"
    - "女生 在线问诊"
    - "妇科 线上"
  elderly:
    - "老年人 用百度健康"
    - "帮爸妈 网上问诊"
  chronic_disease:
    - "慢性病 线上复诊"
    - "长期用药 咨询"

# ========== 配置说明 ==========
# 添加新关键词原则：
# 1. 具体化：使用用户真实表达方式
# 2. 多样化：正面/中性/负面各占约1/3
# 3. 时效性：根据近期舆情热点及时更新
# 
# 验证标准：
# - 在目标平台手动搜索3-5个关键词
# - 命中率 > 50% 才加入正式关键词库
